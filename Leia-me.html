<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para meu amor</title>
    <style>
        /* Fundo com gradiente animado suave */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Georgia', serif;
            overflow: hidden;
            background: linear-gradient(-45deg, #fae1dd, #ffc8c8, #ffe0ec, #ffdfd3);
            background-size: 400% 400%;
            animation: moverFundo 10s ease infinite;
        }

        @keyframes moverFundo {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            cursor: pointer;
            text-align: center;
            position: relative;
            z-index: 10;
            width: 100%; /* Garante que ocupe a largura toda para centralizar bem */
            display: flex;
            justify-content: center;
        }

        /* Envelope BEM maior para ser fácil de clicar no celular */
        #envelope {
            font-size: 140px; /* Aumentado de 120px para 150px */
            display: block;
            animation: pulsar 2s infinite;
            filter: drop-shadow(0 0 15px rgba(255, 107, 129, 0.5));
            transition: transform 0.3s;
        }

        #envelope:hover {
            transform: scale(1.1) rotate(-5deg);
            animation: none;
        }

        @keyframes pulsar {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Cartão adaptável para celular */
        #mensagem {
            display: none;
            background: #ffffff;
            padding: 40px 25px; /* Ajuste no preenchimento interno */
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            width: 75%; /* No celular, ocupa 85% da tela */
            max-width: 400px; /* No PC, não passa de 400px */
            border: 2px solid #ffdde1;
            position: relative;
            animation: abrirCartao 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-sizing: border-box; /* Impede que o padding quebre a largura */
        }
        /* Detalhe de "fita" no topo do cartão */
        #mensagem::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px; /* Fita um pouco maior */
            height: 8px;
            background-color: #ff7675;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }
        h2 { 
            color: #d63031; 
            margin-top: 0;
            font-size: 28px; /* Título maior */
            letter-spacing: 1px;
        }
        p { 
            color: #4a4a4a; 
            line-height: 1.6; 
            font-size: 20px; /* Texto maior e mais legível no celular */
        }
        strong {
            color: #d63031;
            font-size: 22px; /* Destaque maior */
        }
        @keyframes abrirCartao {
            from { opacity: 0; transform: translateY(50px) scale(0.8); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        /* Partículas flutuantes */.particula {
            position: absolute;
            user-select: none;
            pointer-events: none;
            animation: flutuar 2.5s ease-in forwards;
            z-index: 1;
        }
        @keyframes flutuar {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container" onclick="abrirCarta()">
        <div id="envelope">✉️</div>
        <div id="mensagem">
            <h2>Para o meu MUNDO ❤️</h2>
            <p>Eu só queria dizer que você é a pessoa mais especial do universo. Clicar nesse envelope foi fácil, mas meu amor por você não tem explicação!</p>
            <p><strong>Amo você, ao infinito ......!</strong></p>
        </div>
    </div>
    <script>
        function abrirCarta() {
            document.getElementById('envelope').style.display = 'none';
            document.getElementById('mensagem').style.display = 'block';
            const emojis = ['❤️', '💖', '✨', '💕', '🥰'];
            for (let i = 0; i < 45; i++) {
                setTimeout(() => {
                    criarParticula(emojis);
                }, i * 60);
            }
        }
        function criarParticula(emojis) {
            const particula = document.createElement('div');
            particula.className = 'particula'; 
            const emojiAleatorio = emojis[Math.floor(Math.random() * emojis.length)];
            particula.innerHTML = emojiAleatorio; 
            particula.style.left = (Math.random() * 100) + 'vw';
            particula.style.top = '100vh'; 
            particula.style.fontSize = (Math.random() * 30 + 20) + 'px'; 
            document.body.appendChild(particula);
            setTimeout(() => {
                particula.remove();
            }, 2500);
        }
    </script>
</body>
</html>
